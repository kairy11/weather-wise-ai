<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise AI</title>
    <link rel="stylesheet" href="stylesheet.css"/>
</head>

<body>

    <div class="container">

        <header>
            <h1>🌤 WeatherWise AI</h1>
            <p class="subtitle">Real-time weather + AI outfit suggestions</p>
        </header>

        <div class="search-bar">
            <input
                type="text"
                id="city-input"
                placeholder="Enter a city..."
                autocomplete="off"
            />
            <button id="search-btn">Search</button>
        </div>

        <div class="weather-card hidden" id="weather-card">
            <h2 id="city-name">-</h2>
            <div class="weather-main">
                <span id="weather-icon">🌡️</span>
                <span id="temperature">-</span>
            </div>
            <p id="condition">-</p>
            <div class="weather-details">
                <div class="detail">
                    <span class="label">Humidity</span>
                    <span id="humidity">-</span>
                </div>
                <div class="detail">
                    <span class="label">Wind</span>
                    <span id="wind">-</span>
                </div>
                <div class="detail">
                    <span class="label">Feels like</span>
                    <span id="feels-like">-</span>
                </div>
            </div>
        </div>

        <div class="style-selector hidden" id="style-selector">
            <p>What's your style today?</p>
            <div class="style-options">
                <button class="style-btn" data-style="casual">👕 Casual</button>
                <button class="style-btn" data-style="formal">👔 Formal</button>
                <button class="style-btn" data-style="athletic">🏃 Athletic</button>
                <button class="style-btn" data-style="streetwear">🧢 Streetwear</button>
            </div>
        </div>

        <div class="ai-suggestion hidden" id="ai-suggestion">
            <h3>✨ AI Outfit Suggestion</h3>
            <p id="suggestion-text">-</p>
        </div>

        <div class="loading hidden" id="loading">
            <p>Thinking...</p>
        </div>

        <div class="error hidden" id="error">
            <p id="error-text">Something went wrong. Try again.</p>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="weather.js"></script>
    <script src="ai.js"></script>
</body>
</html>
